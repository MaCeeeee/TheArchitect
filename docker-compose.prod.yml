networks:
  web:
    external: true
    name: traefik_web
  internal:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  mongodb_data:
  redis_data:
  minio_data:

services:
  app:
    build: .
    container_name: thearchitect-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=4000
      - CLIENT_URL=https://thearchitect.site
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_REFRESH_EXPIRES_IN=30d
      - MONGODB_URI=mongodb://thearchitect:${MONGO_PASSWORD}@mongodb:27017/thearchitect?authSource=admin
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}
      - MINIO_BUCKET=thearchitect-files
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-haiku-4-5-20251001}
    labels:
      - traefik.enable=true
      - traefik.http.routers.thearchitect.rule=Host(`thearchitect.site`) || Host(`www.thearchitect.site`)
      - traefik.http.routers.thearchitect.entrypoints=websecure
      - traefik.http.routers.thearchitect.tls.certresolver=myresolver
      - traefik.http.services.thearchitect.loadbalancer.server.port=4000
    networks:
      - web
      - internal
    depends_on:
      - mongodb
      - neo4j
      - redis
      - minio

  mongodb:
    image: mongo:7
    container_name: thearchitect-mongodb
    restart: unless-stopped
    environment:
      - MONGO_INITDB_ROOT_USERNAME=thearchitect
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=thearchitect
    volumes:
      - mongodb_data:/data/db
    networks:
      - internal

  neo4j:
    image: neo4j:5-community
    container_name: thearchitect-neo4j
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: thearchitect-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: thearchitect-minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - internal
